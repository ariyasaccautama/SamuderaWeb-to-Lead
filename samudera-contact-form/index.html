<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-type"
    content="text/html; charset=UTF-8"
  />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Contact Us | Samudera</title>

  <!-- Google reCAPTCHA -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

  <script>
    function timestamp() {
      const response = document.getElementById("g-recaptcha-response");
      const captchaSettings = document.getElementsByName("captcha_settings")[0];

      if (
        captchaSettings &&
        (
          response === null ||
          response.value.trim() === ""
        )
      ) {
        const settings = JSON.parse(captchaSettings.value);

        settings.ts = JSON.stringify(new Date().getTime());
        captchaSettings.value = JSON.stringify(settings);
      }
    }

    setInterval(timestamp, 500);
  </script>

  <style>
    :root {
      --navy: #07163f;
      --red: #d80b2f;
      --yellow: #ffba08;
      --bg: #f4f4f6;
      --border: #d8dde6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--navy);
      background: var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 34px;
      background: #fff;
      border-bottom: 1px solid #eceef2;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      font-weight: 700;
    }

    .brand-mark {
      position: relative;
      width: 44px;
      height: 34px;
      color: var(--red);
      font-family: Arial, sans-serif;
      font-size: 28px;
      font-weight: 800;
      line-height: 34px;
      text-align: center;
      border-top: 5px solid var(--red);
      border-bottom: 5px solid var(--red);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 0;
      width: 11px;
      height: 5px;
      background: var(--red);
    }

    .brand-mark::before {
      top: 7px;
    }

    .brand-mark::after {
      bottom: 7px;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 42px;
      font-size: 18px;
      color: #000;
    }

    .login-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 28px;
      border-radius: 5px;
      background: var(--yellow);
      color: #000;
      font-size: 18px;
      font-weight: 700;
    }

    .page-shell {
      padding: 62px 15px 0;
    }

    .form-card {
      width: 100%;
      min-height: 630px;
      padding: 54px 60px 38px;
      background: #fff;
    }

    .form-title {
      margin: 0 0 24px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
    }

    .divider {
      height: 1px;
      margin-bottom: 36px;
      background: #dedede;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 26px 30px;
    }

    .field {
      grid-column: span 6;
    }

    .half {
      grid-column: span 3;
    }

    .third {
      grid-column: span 2;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #000;
      font-size: 19px;
      font-weight: 700;
    }

    .required {
      color: var(--red);
    }

    input {
      width: 100%;
      min-height: 56px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: #fff;
      color: #111827;
      font: inherit;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #6d7ea5;
      box-shadow: 0 0 0 3px rgba(7, 22, 63, 0.08);
    }

    input::placeholder {
      color: #8b94a6;
    }

    .captcha-wrapper {
      grid-column: span 6;
      min-height: 78px;
      display: flex;
      align-items: center;
    }

    .actions {
      grid-column: span 6;
      padding-top: 4px;
    }

    .submit-button {
      min-width: 141px;
      min-height: 55px;
      padding: 0 34px;
      border: 0;
      border-radius: 5px;
      background: var(--red);
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-button:hover {
      background: #b90828;
    }

    .submit-button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    .form-message {
      grid-column: span 6;
      display: none;
      margin: 0;
      padding: 14px 16px;
      border-radius: 5px;
      font-size: 15px;
      line-height: 1.5;
    }

    .form-message.error {
      display: block;
      border: 1px solid #f1aeb5;
      background: #f8d7da;
      color: #842029;
    }

    .honeypot {
      position: absolute !important;
      left: -9999px !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
    }

    @media (max-width: 900px) {
      .site-header {
        height: auto;
        min-height: 76px;
        gap: 20px;
        flex-wrap: wrap;
        padding: 16px 22px;
      }

      .main-nav {
        order: 3;
        width: 100%;
        justify-content: center;
        gap: 24px;
        font-size: 16px;
      }

      .page-shell {
        padding-top: 28px;
      }

      .form-card {
        padding: 36px 24px;
      }

      .half,
      .third {
        grid-column: span 6;
      }
    }

    @media (max-width: 560px) {
      .brand {
        font-size: 23px;
      }

      .login-button {
        padding: 0 16px;
        font-size: 15px;
      }

      .main-nav {
        justify-content: flex-start;
        overflow-x: auto;
      }

      .form-title {
        font-size: 31px;
      }

      .form-card {
        padding: 30px 18px;
      }

      .captcha-wrapper {
        overflow-x: auto;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a href="#" class="brand">
      <span class="brand-mark">S</span>
      <span>SAMUDERA</span>
    </a>

    <nav class="main-nav">
      <a href="#">Home</a>
      <a href="#">
        Services
        <span aria-hidden="true">⌄</span>
      </a>
      <a href="#">Privacy Policy</a>
    </nav>

    <a href="#" class="login-button">
      <span aria-hidden="true">👤</span>
      <span>Login/Register</span>
    </a>
  </header>

  <main class="page-shell">
    <section class="form-card">
      <h1 class="form-title">We'd love to hear from you:</h1>
      <div class="divider"></div>

      <form
        id="salesforceLeadForm"
        action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DdZ000003ieEX"
        method="POST"
      >
        <!-- Salesforce reCAPTCHA configuration -->
        <input
          type="hidden"
          name="captcha_settings"
          value='{"keyname":"label1","fallback":"true","orgId":"00DdZ000003ieEX","ts":""}'
        />

        <!-- Salesforce Organization ID -->
        <input
          type="hidden"
          name="oid"
          value="00DdZ000003ieEX"
        />

        <!-- Halaman tujuan setelah submit -->
        <input
          type="hidden"
          name="retURL"
          value="http://google.com"
        />

        <!-- Lead Source -->
        <input
          type="hidden"
          id="lead_source"
          name="lead_source"
          value="Web"
        />

        <!-- Debug Web-to-Lead, aktifkan saat testing -->
        <!--
        <input type="hidden" name="debug" value="1" />
        <input
          type="hidden"
          name="debugEmail"
          value="ariya.sacca@treessolutions.com"
        />
        -->

        <div class="form-grid">
          <div class="field half">
            <label for="first_name">
              First Name<span class="required">*</span>
            </label>

            <input
              id="first_name"
              name="first_name"
              type="text"
              maxlength="40"
              autocomplete="given-name"
              required
            />
          </div>

          <div class="field half">
            <label for="last_name">
              Last Name<span class="required">*</span>
            </label>

            <input
              id="last_name"
              name="last_name"
              type="text"
              maxlength="80"
              autocomplete="family-name"
              required
            />
          </div>

          <div class="field">
            <label for="email">
              Email<span class="required">*</span>
            </label>

            <input
              id="email"
              name="email"
              type="email"
              maxlength="80"
              placeholder="email@email.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="field third">
            <label for="company">
              Company<span class="required">*</span>
            </label>

            <input
              id="company"
              name="company"
              type="text"
              maxlength="40"
              autocomplete="organization"
              required
            />
          </div>

          <div class="field third">
            <label for="city">City</label>

            <input
              id="city"
              name="city"
              type="text"
              maxlength="40"
              autocomplete="address-level2"
            />
          </div>

          <div class="field third">
            <label for="state">State/Province</label>

            <input
              id="state"
              name="state"
              type="text"
              maxlength="20"
              autocomplete="address-level1"
            />
          </div>

          <!-- Anti-spam honeypot -->
          <div class="honeypot" aria-hidden="true">
            <label for="website_url">Website URL</label>

            <input
              id="website_url"
              name="website_url"
              type="text"
              tabindex="-1"
              autocomplete="off"
            />
          </div>

          <p
            id="formMessage"
            class="form-message"
            role="alert"
          ></p>

          <!-- Salesforce Google reCAPTCHA -->
          <div class="captcha-wrapper">
            <div
              class="g-recaptcha"
              data-sitekey="6LcNlF0tAAAAAGf8BnAeCja078YXukunf4P3omMe"
            ></div>
          </div>

          <div class="actions">
            <button
              id="submitButton"
              class="submit-button"
              type="submit"
            >
              Submit
            </button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script>
    const salesforceLeadForm = document.getElementById(
      "salesforceLeadForm"
    );

    const submitButton = document.getElementById("submitButton");
    const formMessage = document.getElementById("formMessage");

    salesforceLeadForm.addEventListener("submit", function (event) {
      const honeypot = document.getElementById("website_url");
      const captchaResponse = document.getElementById(
        "g-recaptcha-response"
      );

      formMessage.className = "form-message";
      formMessage.textContent = "";

      // Blokir bot yang mengisi honeypot.
      if (honeypot && honeypot.value.trim() !== "") {
        event.preventDefault();
        return;
      }

      // Validasi reCAPTCHA sebelum dikirim ke Salesforce.
      if (
        !captchaResponse ||
        captchaResponse.value.trim() === ""
      ) {
        event.preventDefault();

        formMessage.className = "form-message error";
        formMessage.textContent =
          "Please complete the reCAPTCHA verification before submitting.";

        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Submitting...";
    });
  </script>
</body>
</html>
