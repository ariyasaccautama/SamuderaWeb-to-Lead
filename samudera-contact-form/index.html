<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Samudera</title>
  <style>
    :root{--navy:#07163f;--red:#d80b2f;--yellow:#ffba08;--bg:#f4f4f6;--border:#d8dde6}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--navy);background:var(--bg)}
    a{color:inherit;text-decoration:none}
    .site-header{height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 34px;background:#fff;border-bottom:1px solid #eceef2}
    .brand{display:flex;align-items:center;gap:14px;font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:700}
    .brand-mark{position:relative;width:44px;height:34px;color:var(--red);font-family:Arial,sans-serif;font-size:28px;font-weight:800;line-height:34px;text-align:center;border-top:5px solid var(--red);border-bottom:5px solid var(--red)}
    .brand-mark:before,.brand-mark:after{content:"";position:absolute;left:0;width:11px;height:5px;background:var(--red)}
    .brand-mark:before{top:7px}.brand-mark:after{bottom:7px}
    .main-nav{display:flex;align-items:center;gap:42px;font-size:18px;color:#000}
    .login-button{display:inline-flex;align-items:center;gap:8px;min-height:48px;padding:0 28px;border-radius:5px;background:var(--yellow);color:#000;font-size:18px;font-weight:700}
    .page-shell{padding:62px 15px 0}
    .form-card{width:100%;min-height:630px;padding:54px 60px 38px;background:#fff}
    .form-title{margin:0 0 24px;font-family:Georgia,"Times New Roman",serif;font-size:38px}
    .divider{height:1px;margin-bottom:36px;background:#dedede}
    .form-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:26px 30px}
    .field{grid-column:span 6}.half{grid-column:span 3}.third{grid-column:span 2}
    label{display:block;margin-bottom:10px;color:#000;font-size:19px;font-weight:700}
    .required{color:var(--red)}
    input{width:100%;min-height:56px;padding:12px 16px;border:1px solid var(--border);border-radius:5px;background:#fff;color:#111827;font:inherit;font-size:18px;outline:none}
    input:focus{border-color:#6d7ea5;box-shadow:0 0 0 3px rgba(7,22,63,.08)}
    input::placeholder{color:#8b94a6}
    .captcha-wrapper{grid-column:span 6;min-height:78px;display:flex;align-items:center}
    .captcha-placeholder{width:304px;min-height:78px;display:grid;place-items:center;border:1px dashed #b9c0cc;border-radius:5px;color:#747d8d;background:#fafafa;font-size:14px;text-align:center;padding:12px}
    .actions{grid-column:span 6;padding-top:4px}
    .submit-button{min-width:141px;min-height:55px;padding:0 34px;border:0;border-radius:5px;background:var(--red);color:#fff;font-size:18px;font-weight:700;cursor:pointer}
    .honeypot{position:absolute!important;left:-9999px!important;width:1px!important;height:1px!important;overflow:hidden!important}
    @media(max-width:900px){
      .site-header{height:auto;min-height:76px;gap:20px;flex-wrap:wrap;padding:16px 22px}
      .main-nav{order:3;width:100%;justify-content:center;gap:24px;font-size:16px}
      .page-shell{padding-top:28px}.form-card{padding:36px 24px}
      .half,.third{grid-column:span 6}
    }
    @media(max-width:560px){
      .brand{font-size:23px}.login-button{padding:0 16px;font-size:15px}
      .main-nav{justify-content:flex-start;overflow-x:auto}
      .form-title{font-size:31px}.form-card{padding:30px 18px}
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="#" class="brand"><span class="brand-mark">S</span><span>SAMUDERA</span></a>
    <nav class="main-nav">
      <a href="#">Home</a>
      <a href="#">Services <span aria-hidden="true">⌄</span></a>
      <a href="#">Privacy Policy</a>
    </nav>
    <a href="#" class="login-button"><span>👤</span><span>Login/Register</span></a>
  </header>

  <main class="page-shell">
    <section class="form-card">
      <h1 class="form-title">We'd love to hear from you:</h1>
      <div class="divider"></div>

      <form
        id="salesforceLeadForm"
        action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8"
        method="POST"
      >
        <!-- Nanti diganti berdasarkan hasil generate Web-to-Lead Salesforce -->
        <input type="hidden" name="oid" value="GANTI_DENGAN_ORG_ID" />
        <input type="hidden" name="retURL" value="https://domain-kamu.com/thank-you.html" />
        <input type="hidden" name="lead_source" value="Website" />

        <div class="form-grid">
          <div class="field half">
            <label for="first_name">First Name<span class="required">*</span></label>
            <input id="first_name" name="first_name" type="text" maxlength="40" required />
          </div>

          <div class="field half">
            <label for="last_name">Last Name<span class="required">*</span></label>
            <input id="last_name" name="last_name" type="text" maxlength="80" required />
          </div>

          <div class="field">
            <label for="email">Email<span class="required">*</span></label>
            <input id="email" name="email" type="email" maxlength="80" placeholder="email@email.com" required />
          </div>

          <div class="field third">
            <label for="company">Company<span class="required">*</span></label>
            <input id="company" name="company" type="text" maxlength="40" required />
          </div>

          <div class="field third">
            <label for="city">City</label>
            <input id="city" name="city" type="text" maxlength="40" />
          </div>

          <div class="field third">
            <label for="state">State/Province</label>
            <input id="state" name="state" type="text" maxlength="80" />
          </div>

          <div class="honeypot" aria-hidden="true">
            <label for="website_url">Website URL</label>
            <input id="website_url" name="website_url" type="text" tabindex="-1" autocomplete="off" />
          </div>

          <!-- Nanti kode CAPTCHA Salesforce ditempel menggantikan placeholder ini -->
          <div class="captcha-wrapper">
            <div class="captcha-placeholder">Salesforce reCAPTCHA akan dipasang di sini</div>
          </div>

          <div class="actions">
            <button class="submit-button" type="submit">Submit</button>
          </div>
        </div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById("salesforceLeadForm").addEventListener("submit", function(event) {
      const honeypot = document.getElementById("website_url");
      if (honeypot && honeypot.value.trim() !== "") event.preventDefault();
    });
  </script>
</body>
</html>
